; CO2 gauge — stepper needle + TM1637 + SCD41 (no WiFi)
[platformio]
src_dir = main

[env:esp32dev]
platform = espressif32@^6.8.0
framework = espidf
board = esp32dev
monitor_speed = 115200
upload_speed = 115200
monitor_filters = direct
upload_flags =
    --no-stub
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
